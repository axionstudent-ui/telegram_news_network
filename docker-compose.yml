version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: news_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  telegram_bot:
    build: .
    container_name: news_bot
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - BOT_TOKEN=${BOT_TOKEN}
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}

volumes:
  mongo_data:
